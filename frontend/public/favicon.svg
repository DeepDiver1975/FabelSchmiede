<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Fabelschmiede d20">
  <defs>
    <radialGradient id="ember" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#d6863f"/>
      <stop offset="55%" stop-color="#b5642f"/>
      <stop offset="100%" stop-color="#6d3a18"/>
    </radialGradient>
  </defs>
  <!-- dark forge backdrop -->
  <rect width="64" height="64" rx="12" fill="#1a1712"/>
  <!-- d20 (icosahedron) silhouette -->
  <g stroke="#3a2f22" stroke-width="1.4" stroke-linejoin="round">
    <polygon points="32,6 55,20 55,44 32,58 9,44 9,20" fill="url(#ember)"/>
    <!-- inner triangular facets -->
    <polygon points="32,6 46,17 18,17" fill="#e8e0d0" opacity="0.16"/>
    <polygon points="32,15 46,17 40,34 24,34 18,17" fill="#e8e0d0" opacity="0.07"/>
    <polygon points="9,20 18,17 24,34 12,40" fill="#000000" opacity="0.18"/>
    <polygon points="55,20 46,17 40,34 52,40" fill="#000000" opacity="0.10"/>
    <polygon points="32,58 12,40 24,34 40,34 52,40" fill="#000000" opacity="0.22"/>
    <line x1="24" y1="34" x2="32" y2="15"/>
    <line x1="40" y1="34" x2="32" y2="15"/>
    <line x1="24" y1="34" x2="12" y2="40"/>
    <line x1="40" y1="34" x2="52" y2="40"/>
    <line x1="24" y1="34" x2="40" y2="34"/>
  </g>
  <!-- the "20" struck on the top facet -->
  <text x="32" y="30" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="13" fill="#fff4e2">20</text>
</svg>
